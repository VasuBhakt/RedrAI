# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  RedrAI is a rule-based and semantic hybrid ranking engine that runs fully locally under the 5-minute CPU constraint. All weights and penalties are parameterized in src/config.py.
  Candidate narratives (summaries + career histories) are embedded offline using sentence-transformers (all-MiniLM-L6-v2). The JD is encoded dynamically at runtime. We use NumPy matrix multiplication (a 100k × 384 dot product) to compute cosine similarity across the dataset.
  We parse the JD to extract required skills, locations, and experience bounds. Candidates matching fewer than `MIN_SKILL_MATCHES_FOR_FULL_SCORE` are penalized (LOW_SKILL_MATCH_PENALTY), while those hitting high skill thresholds `HIGH_SKILL_MATCH_THRESHOLD` with relevant career trajectories are boosted (HIGH_SKILL_MATCH_BOOST). A title-relevance check (KEYWORD_STUFFER_PENALTY) penalizes keyword stuffers (e.g., Mechanical Engineers claiming AI skills), while genuine AI/ML titles get a separate boost (HIGHLY_RELEVANT_TITLE_BOOST).
  Behavioral signals — responsiveness, GitHub activity, location/notice fit — are also factored in. Deterministic honeypot detection flags candidates with impossible skill-depth or duration claims.
  Reasoning strings are generated deterministically from computed scores, guaranteeing zero hallucinations. The full pipeline runs in under 2 minutes for 100k candidates, CPU only.
  An adversarial testing suite (pytest) aggressively protects algorithmic integrity against keyword stuffers, missing data, and honeypot exploits.

